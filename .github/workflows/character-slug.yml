name: character-slug

on:
  push:
    paths:
      - 'packages/character-slug/**'
  pull_request:
    paths:
      - 'packages/character-slug/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        working-directory: packages/character-slug
